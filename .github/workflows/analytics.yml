name: Cloudflare Analytics (taeglich)

on:
  schedule:
    - cron: '30 6 * * *'   # taeglich 06:30 UTC (~08:30 MESZ)
  workflow_dispatch: {}     # erlaubt manuellen Start (zum Testen)

permissions:
  contents: write

# === Konfiguration: fuer andere Domain/Account nur diese beiden Werte aendern ===
env:
  CF_ACCOUNT_ID: f2ebe7b029e50df96e3d90cfbcb025bd
  CF_SITE_TAG: 8b998fc005094371baf5507d47963803

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cloudflare-Daten holen
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: node analytics/build.mjs
      - name: Daten committen
        run: |
          git config user.name "analytics-bot"
          git config user.email "actions@users.noreply.github.com"
          git add analytics/history.json
          git diff --staged --quiet || git commit -m "Analytics-Update $(date -u +%F)"
          git push
